name: Deploy (Canliya Al)

on:
  workflow_dispatch:
    inputs:
      aciklama:
        description: 'Ne deploy ediliyor (ornek: ana sayfa metni guncellendi)'
        required: true
        type: string
      deploy_kaynak:
        description: 'Deploy kaynagi'
        required: true
        type: choice
        options:
          - kaynak_koddan_derle
          - ci_artifact
        default: kaynak_koddan_derle

run-name: Deploy - ${{ github.actor }} - ${{ inputs.aciklama }}

concurrency:
  group: wsl-self-hosted-${{ github.repository }}-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    steps:
      - name: Kodu indir (checkout)
        uses: actions/checkout@v4

      - name: Deploy ozeti
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Deploy eden: ${{ github.actor }}"
          echo "Deploy kaynagi: ${{ inputs.deploy_kaynak }}"
          echo "Commit: $COMMIT_MSG"
          echo "## Deploy Ozeti" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy eden: **${{ github.actor }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Kaynak: **${{ inputs.deploy_kaynak }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: $COMMIT_MSG" >> "$GITHUB_STEP_SUMMARY"
          echo "- Hedefler: **PublicApi (5200)** + **Web magaza (5001)**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Not: ${{ inputs.aciklama }}" >> "$GITHUB_STEP_SUMMARY"

      - name: SQL Server hazir mi
        run: bash deploy/scripts/ensure-sql.sh

      - name: .NET build ve test
        if: inputs.deploy_kaynak == 'kaynak_koddan_derle'
        uses: ./.github/actions/dotnet-build-test
        with:
          configuration: Release
          solution: eShopOnWeb.sln

      - name: CI artifact indir
        if: inputs.deploy_kaynak == 'ci_artifact'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=ci.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json databaseId \
            -q '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Basarili CI run bulunamadi."
            exit 1
          fi
          gh run download "$RUN_ID" \
            -R "${{ github.repository }}" \
            -n eshopapi-publish \
            -D /tmp/eshopapi-artifact
          gh run download "$RUN_ID" \
            -R "${{ github.repository }}" \
            -n eshopweb-publish \
            -D /tmp/eshopweb-artifact
          echo "API_ARTIFACT_DIR=/tmp/eshopapi-artifact" >> "$GITHUB_ENV"
          echo "WEB_ARTIFACT_DIR=/tmp/eshopweb-artifact" >> "$GITHUB_ENV"

      - name: Mevcut surumleri yedekle
        run: |
          if [ -d /opt/eshopapi ]; then
            rm -rf /opt/eshopapi.previous
            cp -a /opt/eshopapi /opt/eshopapi.previous
          fi
          if [ -d /opt/eshopweb ]; then
            rm -rf /opt/eshopweb.previous
            cp -a /opt/eshopweb /opt/eshopweb.previous
          fi
          echo "- Onceki surumler yedeklendi" >> "$GITHUB_STEP_SUMMARY"

      - name: Yayinla API (kaynak koddan)
        if: inputs.deploy_kaynak == 'kaynak_koddan_derle'
        run: |
          STAGING=$(mktemp -d)
          dotnet publish src/PublicApi/PublicApi.csproj --configuration Release --output "$STAGING" /p:UseSharedCompilation=false
          mkdir -p /opt/eshopapi
          rsync -a --delete "$STAGING/" /opt/eshopapi/
          rm -rf "$STAGING"

      - name: Yayinla Web (kaynak koddan)
        if: inputs.deploy_kaynak == 'kaynak_koddan_derle'
        run: |
          STAGING=$(mktemp -d)
          dotnet publish src/Web/Web.csproj --configuration Release --output "$STAGING" /p:UseSharedCompilation=false
          mkdir -p /opt/eshopweb
          rsync -a --delete "$STAGING/" /opt/eshopweb/
          rm -rf "$STAGING"

      - name: Yayinla API (CI artifact)
        if: inputs.deploy_kaynak == 'ci_artifact'
        run: |
          mkdir -p /opt/eshopapi
          rsync -a --delete "${API_ARTIFACT_DIR}/" /opt/eshopapi/

      - name: Yayinla Web (CI artifact)
        if: inputs.deploy_kaynak == 'ci_artifact'
        run: |
          mkdir -p /opt/eshopweb
          rsync -a --delete "${WEB_ARTIFACT_DIR}/" /opt/eshopweb/

      - name: Deploy bilgisini kaydet
        run: |
          for target in eshopapi eshopweb; do
            cat > "/opt/${target}/.deploy-info" <<EOF
          deploy_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          commit=${{ github.sha }}
          deployed_by=${{ github.actor }}
          deploy_kaynak=${{ inputs.deploy_kaynak }}
          note=${{ inputs.aciklama }}
          EOF
          done

      - name: Servisleri yeniden baslat
        run: |
          pkill -f 'dotnet /opt/eshopapi' || true
          pkill -f 'dotnet /opt/eshopweb' || true
          sleep 1
          systemctl restart eshopapi
          systemctl restart eshopweb

      - name: API saglik kontrolu
        id: api_health
        continue-on-error: true
        run: bash .github/scripts/verify-health.sh http://127.0.0.1:5200

      - name: Web magaza saglik kontrolu
        id: web_health
        continue-on-error: true
        run: bash .github/scripts/verify-health.sh http://127.0.0.1:5001

      - name: Saglik basarisiz - otomatik geri al
        if: steps.api_health.outcome == 'failure' || steps.web_health.outcome == 'failure'
        run: |
          if [ -d /opt/eshopapi.previous ] || [ -d /opt/eshopweb.previous ]; then
            bash .github/scripts/rollback-eshop-all.sh
            bash .github/scripts/verify-health.sh http://127.0.0.1:5200 || true
            bash .github/scripts/verify-health.sh http://127.0.0.1:5001 || true
            echo "- Otomatik rollback yapildi" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy basarisiz (health check)
        if: steps.api_health.outcome == 'failure' || steps.web_health.outcome == 'failure'
        run: exit 1
