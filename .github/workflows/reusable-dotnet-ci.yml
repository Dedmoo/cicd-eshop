name: Reusable .NET CI

on:
  workflow_call:
    inputs:
      configuration:
        description: Build configuration
        required: false
        type: string
        default: Release
      upload_artifact:
        description: Publish ciktisini artifact olarak yukle
        required: false
        type: boolean
        default: false
      api_artifact_name:
        description: PublicApi artifact adi
        required: false
        type: string
        default: eshopapi-publish
      web_artifact_name:
        description: Web artifact adi
        required: false
        type: string
        default: eshopweb-publish

jobs:
  build-test:
    runs-on: self-hosted

    steps:
      - name: Kodu indir (checkout)
        uses: actions/checkout@v4

      - name: .NET build ve test
        uses: ./.github/actions/dotnet-build-test
        with:
          configuration: ${{ inputs.configuration }}
          solution: eShopOnWeb.sln

      - name: Publish (artifact icin)
        if: inputs.upload_artifact
        run: |
          API_STAGING=$(mktemp -d)
          WEB_STAGING=$(mktemp -d)
          dotnet publish src/PublicApi/PublicApi.csproj \
            --configuration ${{ inputs.configuration }} \
            --output "$API_STAGING" \
            /p:UseSharedCompilation=false
          dotnet publish src/Web/Web.csproj \
            --configuration ${{ inputs.configuration }} \
            --output "$WEB_STAGING" \
            /p:UseSharedCompilation=false
          echo "API_STAGING_DIR=$API_STAGING" >> "$GITHUB_ENV"
          echo "WEB_STAGING_DIR=$WEB_STAGING" >> "$GITHUB_ENV"

      - name: Artifact yukle (API)
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.api_artifact_name }}
          path: ${{ env.API_STAGING_DIR }}
          retention-days: 30

      - name: Artifact yukle (Web)
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.web_artifact_name }}
          path: ${{ env.WEB_STAGING_DIR }}
          retention-days: 30

      - name: Gecici publish klasorlerini temizle
        if: always() && inputs.upload_artifact
        run: |
          rm -rf "${API_STAGING_DIR:-}"
          rm -rf "${WEB_STAGING_DIR:-}"
